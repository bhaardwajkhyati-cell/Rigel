<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login/SignUp</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link<link rel="stylesheet" href="login.css">
</head>
<body>
  <aside class="box">
    <header>
      <img class="logo" src="./images/Regile-logo.png" alt="RIGEL-logo">
      <p>Enter Your Digital World</p>
    </header>
    <main>
    <form class="form" method="POST" action="/login">
      <div class="form-input">
        <i class="fa-solid fa-user"></i>
        <input type="text" name="email" placeholder="Email" required class="detail-text" />
      </div>
      <div class="form-input">
        <i class="fa-solid fa-lock"></i>
        <input type="password" name="password" placeholder="Password" required class="detail-text" />
      </div>
      <button type="submit">Access My Space</button>
      <div class="mid">
        <div class="check">
          <input type="checkbox"></input>
          <p>Remember me</p>
        </div>
        <a href="#">Forgot Password?</a>
      </div>
      <div class="lower">
        <hr>
        <p>Don't have an account?<a href="#"> Sign Up</a></p>
      </div>
    </form>
    </main>
  </aside>
</body>
</html>
